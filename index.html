<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Monstruo del Español</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--bg2:#111118;--bg3:#18181f;--border:#252530;
  --accent:#c8ff3e;--accent2:#ff5c3e;--accent3:#3ec8ff;--gold:#ffd700;--purple:#b97cff;--pink:#ff6eb4;
  --text:#efefef;--muted:#55556a;--muted2:#888899;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(200,255,62,.05),transparent);pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.25rem 5rem}

/* HERO */
.hero{text-align:center;padding:2rem 0 1.5rem}
.flag{font-size:2.2rem;margin-bottom:.5rem;display:block}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,8vw,5.5rem);line-height:.9;letter-spacing:.03em;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem}
.hero p{font-size:12px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}

/* LEVEL CARD */
.level-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:10px;position:relative;overflow:hidden}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--purple))}
.level-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:8px}
.lv-badge{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.06em;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;padding:3px 12px;border-radius:20px;margin-bottom:3px}
.lv-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.04em}
.lv-xp-big{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--accent);line-height:1}
.lv-xp-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;text-align:right}
.bar-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:4px}
.bar-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .5s cubic-bezier(.22,.68,0,1.2)}

/* DAILY */
.daily-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:10px;position:relative;overflow:hidden}
.daily-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.daily-row{display:flex;align-items:center;gap:14px}
.daily-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;color:var(--accent2);min-width:80px;transition:color .3s}
.daily-num.hit{color:var(--gold)}
.daily-info{flex:1}
.d-bar-track{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;margin-bottom:4px}
.d-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s cubic-bezier(.22,.68,0,1.2)}
.d-bar-fill.hit{background:linear-gradient(90deg,var(--gold),#ffe94e)}
.daily-status{font-size:12px;color:var(--muted2)}
.daily-status.hit{color:var(--gold);font-weight:500}
.reset-btn{background:none;border:1px solid var(--border);color:var(--muted2);font-size:11px;font-family:'DM Sans',sans-serif;padding:5px 11px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.reset-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:.3rem}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;color:var(--accent3)}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:2px}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:7px 16px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab:hover{color:var(--text);border-color:var(--muted2)}
.tab.active{border-color:transparent;font-weight:600}
.tab[data-c="vocab"].active{background:var(--accent);color:#000}
.tab[data-c="verbs"].active{background:var(--accent2);color:#fff}
.tab[data-c="grammar"].active{background:var(--accent3);color:#000}
.tab[data-c="culture"].active{background:var(--purple);color:#fff}
.tab[data-c="levels"].active{background:var(--bg3);color:var(--text);border-color:var(--border)}

.sec{display:none}.sec.active{display:block}

/* CATEGORY LABEL */
.cat-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;color:var(--muted2);margin:1.4rem 0 .6rem;display:flex;align-items:center;gap:8px}
.cat-label span{height:1px;flex:1;background:var(--border)}

/* CONCEPT CARD — the trophy items */
.concept{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;position:relative}
.concept:hover{border-color:rgba(200,255,62,.35);background:var(--bg3);transform:translateX(2px)}
.concept.done{background:#0c1a03;border-color:#2a4810;opacity:.6;cursor:default}
.concept.done:hover{transform:none}
.concept-icon{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center;margin-top:1px}
.concept-body{flex:1;min-width:0}
.concept-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.concept.done .concept-name{text-decoration:line-through;color:var(--muted2)}
.concept-preview{font-size:11px;color:var(--muted2);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.concept-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.xp-badge{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--accent);letter-spacing:.04em}
.concept[data-t="verb"] .xp-badge{color:var(--accent2)}
.concept[data-t="grammar"] .xp-badge{color:var(--accent3)}
.concept[data-t="culture"] .xp-badge{color:var(--purple)}
.concept.done .xp-badge{color:var(--muted)}
.phase-tag{font-size:10px;color:var(--muted2);background:var(--bg3);padding:1px 6px;border-radius:8px;border:1px solid var(--border)}
.done-check{font-size:1rem}

/* LESSON MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:680px;margin:auto;position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.modal.vocab::before{background:linear-gradient(90deg,var(--accent),var(--accent3))}
.modal.verb::before{background:linear-gradient(90deg,var(--accent2),var(--purple))}
.modal.grammar::before{background:linear-gradient(90deg,var(--accent3),var(--accent))}
.modal.culture::before{background:linear-gradient(90deg,var(--purple),var(--pink))}

.modal-head{padding:1.5rem 1.5rem 0}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DM Sans',sans-serif}
.modal-close:hover{color:var(--text);border-color:var(--text)}
.modal-icon{font-size:2rem;margin-bottom:.5rem}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;line-height:1;margin-bottom:.3rem}
.modal-subtitle{font-size:12px;color:var(--muted2);margin-bottom:1rem}
.modal-xp-pill{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.06em;padding:3px 12px;border-radius:20px;margin-bottom:1rem}

.modal-body{padding:0 1.5rem}

/* WORD GRID */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1.5rem}
.word-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:all .15s}
.word-card:hover{border-color:var(--accent);background:#0f1a03}
.word-es{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.word-en{font-size:12px;color:var(--muted2)}
.word-example{font-size:11px;color:var(--accent);margin-top:4px;font-style:italic}

/* EXERCISE */
.exercise-block{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.ex-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:.8rem}
.ex-question{font-size:15px;font-weight:500;color:var(--text);margin-bottom:.75rem;line-height:1.5}
.ex-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.5rem}
.ex-opt{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;text-align:left}
.ex-opt:hover{border-color:var(--accent3);color:var(--accent3)}
.ex-opt.correct{background:#0c1a03;border-color:var(--accent);color:var(--accent);pointer-events:none}
.ex-opt.wrong{background:#1a0505;border-color:var(--accent2);color:var(--accent2);pointer-events:none}
.ex-opt.reveal{background:#0c1a03;border-color:var(--accent);color:var(--accent);pointer-events:none}
.ex-feedback{font-size:13px;margin-top:.5rem;min-height:20px;font-style:italic}
.ex-feedback.good{color:var(--accent)}
.ex-feedback.bad{color:var(--accent2)}

.fill-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:6px;transition:border .15s}
.fill-input:focus{border-color:var(--accent3)}
.fill-input.correct{border-color:var(--accent);background:#0c1a03;color:var(--accent)}
.fill-input.wrong{border-color:var(--accent2);background:#1a0505}
.check-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s}
.check-btn:hover{border-color:var(--accent3);color:var(--accent3)}

/* SLAY BUTTON */
.slay-wrap{padding:1.5rem;text-align:center;border-top:1px solid var(--border);margin-top:.5rem}
.slay-btn{background:linear-gradient(135deg,var(--pink),var(--purple),var(--accent3));color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;padding:16px 48px;border-radius:50px;border:none;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 30px rgba(255,110,180,.3)}
.slay-btn:hover{transform:scale(1.04);box-shadow:0 6px 40px rgba(255,110,180,.5)}
.slay-btn:active{transform:scale(.97)}
.slay-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.slay-sub{font-size:12px;color:var(--muted2);margin-top:.6rem;letter-spacing:.04em}

/* SPARKLE ANIMATION */
@keyframes sparkle{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.sparkle{position:fixed;pointer-events:none;font-size:1.4rem;animation:sparkle .9s ease-out forwards;z-index:999}

/* CONJUGATION TABLE */
.conj-table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:13px}
.conj-table th{background:var(--bg3);color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)}
.conj-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.conj-table tr:last-child td{border-bottom:none}
.conj-table td:first-child{color:var(--muted2);width:40%}
.conj-table td:last-child{font-weight:500;color:var(--accent)}
.conj-table.red td:last-child{color:var(--accent2)}
.conj-table.blue td:last-child{color:var(--accent3)}

/* PHRASE BLOCK */
.phrase-block{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:8px}
.phrase-block.red{border-left-color:var(--accent2)}
.phrase-block.blue{border-left-color:var(--accent3)}
.phrase-block.purple{border-left-color:var(--purple)}
.phrase-es{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.phrase-en{font-size:12px;color:var(--muted2)}
.phrase-note{font-size:11px;color:var(--accent);margin-top:4px;font-style:italic}

/* PROGRESS in modal */
.modal-progress{padding:0 1.5rem;margin-bottom:.5rem}
.mp-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mp-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
.mp-label{font-size:11px;color:var(--muted2);margin-bottom:4px}

/* LEVELS PAGE */
.lv-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);font-size:13px;margin-bottom:5px}
.lv-row.here{border-color:var(--accent);background:#0c1a03}
.lv-row.past{opacity:.4}
.lv-emoji{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.lv-name{flex:1;font-weight:500}
.lv-req{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted2)}
.here-badge{font-size:10px;background:var(--accent);color:#000;padding:1px 8px;border-radius:8px;font-weight:700;letter-spacing:.04em}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;padding:10px 26px;border-radius:30px;z-index:1000;transition:transform .35s cubic-bezier(.22,.68,0,1.2);pointer-events:none;white-space:nowrap;color:#000}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.green{background:var(--accent)}
.toast.gold{background:var(--gold)}
.toast.pink{background:var(--pink);color:#fff}
.toast.red{background:var(--accent2);color:#fff}
.toast{max-width:88vw;text-align:center;padding:12px 22px;white-space:normal;line-height:1.35;font-size:1rem}

/* XP POP */
@keyframes xpPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-55px) scale(1.5)}}
.xp-pop{position:fixed;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;pointer-events:none;animation:xpPop .75s ease-out forwards;z-index:998;text-shadow:0 2px 10px rgba(0,0,0,.6)}

@media(max-width:500px){
  .ex-options{grid-template-columns:1fr}
  .word-grid{grid-template-columns:1fr 1fr}
  .stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
>
<div class="wrap">
  <div class="hero">
    <div style="font-size:4rem;line-height:1;margin-bottom:.4rem">🇪🇸</div>
    <h1>EL MONSTRUO<br>DEL ESPAÑOL</h1>
    <p>Open a lesson · Learn · Slay · Get XP</p>
  </div>

  <div class="level-card">
    <div class="level-top">
      <div>
        <div class="lv-badge" id="lvBadge">LEVEL 1</div>
        <div class="lv-title" id="lvTitle">😴 El Dormido</div>
      </div>
      <div style="text-align:right">
        <div class="lv-xp-big" id="totalXP">0</div>
        <div class="lv-xp-label">Total XP</div>
      </div>
    </div>
    <div class="bar-meta"><span id="barFrom">0 XP</span><span id="barTo">500 XP to next</span></div>
    <div class="bar-track"><div class="bar-fill" id="lvBar" style="width:0%"></div></div>
  </div>

  <div class="daily-card">
    <div class="daily-row">
      <div class="daily-num" id="dailyNum">0</div>
      <div class="daily-info">
        <div class="d-bar-track"><div class="d-bar-fill" id="dBar" style="width:0%"></div></div>
        <div class="daily-status" id="dStatus">Need 100 XP to close the day ✦</div>
      </div>
      <button class="reset-btn" onclick="resetDay()">Reset day</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">🔥 Streak</div>
      <div class="stat-num" id="streakN">0</div>
      <div class="stat-sub">days in a row</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">✅ 100XP days</div>
      <div class="stat-num" id="daysN" style="color:var(--accent)">0</div>
      <div class="stat-sub">goal days hit</div>
    </div>
  </div>

  <div class="daily-card" style="padding-top:1.25rem">
    <div class="tabs" id="tabRow"></div>
    <div id="secVocab" class="sec active"></div>
    <div id="secVerbs" class="sec"></div>
    <div id="secGrammar" class="sec"></div>
    <div id="secCulture" class="sec"></div>
    <div id="secLevels" class="sec"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-head">
      <div class="modal-icon" id="mIcon"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-subtitle" id="mSub"></div>
      <div class="modal-xp-pill" id="mXpPill"></div>
    </div>
    <div class="modal-progress">
      <div class="mp-label" id="mpLabel">Scroll through the lesson</div>
      <div class="mp-track"><div class="mp-fill" id="mpFill" style="width:0%"></div></div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="slay-wrap" id="slayWrap">
      <button class="slay-btn" id="slayBtn" onclick="slay()">✨ SLAAAAAAAY ✨</button>
      <div class="slay-sub" id="slaySub"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
// LEVELS
// ════════════════════════════════════════════════════════════
const LEVELS=[
  {n:1,e:'😴',t:'El Dormido',xp:0},
  {n:2,e:'👶',t:'El Bebé',xp:500},
  {n:3,e:'🚶',t:'El Caminante',xp:1500},
  {n:4,e:'💬',t:'El Conversador',xp:3000},
  {n:5,e:'📺',t:'El Espectador',xp:5000},
  {n:6,e:'🎯',t:'El Preciso',xp:8000},
  {n:7,e:'🔥',t:'El Encendido',xp:12000},
  {n:8,e:'🎬',t:'El del Set',xp:17000},
  {n:9,e:'🗣️',t:'El Fluido',xp:23000},
  {n:10,e:'👑',t:'La Monstrua',xp:30000}
];

// ════════════════════════════════════════════════════════════
// LESSON DATA
// Each lesson has: id, name, icon, type, xp, phase, preview,
// words[] and/or phrases[], conjugation{}, exercises[]
// ════════════════════════════════════════════════════════════
const LESSONS = [

// ───────────── VOCABULAIRE ─────────────
{sec:'vocab', cat:'🗺️ Directions & places', id:'directions', icon:'🗺️', name:'Directions', type:'vocab', xp:15, phase:1,
 preview:'izquierda, derecha, recto, arriba, abajo...',
 words:[
  {es:'izquierda',en:'left',ex:'Gira a la izquierda — Turn left'},
  {es:'derecha',en:'right',ex:'A la derecha — To the right'},
  {es:'recto / todo recto',en:'straight ahead',ex:'Sigue recto — Keep going straight'},
  {es:'arriba',en:'up / upstairs',ex:'Vive arriba — She lives upstairs'},
  {es:'abajo',en:'down / downstairs',ex:'El gym está abajo — The gym is downstairs'},
  {es:'cruzar',en:'to cross',ex:'Cruza la calle — Cross the street'},

 ],

let S = JSON.parse(localStorage.getItem('monstruo_v3')||'null') || {
  totalXP:0, dailyXP:0, streak:0, daysHit:0, bestDay:0, lastDate:null, done:{}
};

function todayStr(){ return new Date().toISOString().split('T')[0]; }
function save(){ localStorage.setItem('monstruo_v3',JSON.stringify(S)); }
function getLv(xp){ let l=LEVELS[0]; for(let i=LEVELS.length-1;i>=0;i--){ if(xp>=LEVELS[i].xp){l=LEVELS[i];break;} } return l; }
function getNext(xp){ for(let i=0;i<LEVELS.length;i++){ if(LEVELS[i].xp>xp) return LEVELS[i]; } return null; }

// ════════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════════
function updateUI(){
  const lv=getLv(S.totalXP), nx=getNext(S.totalXP);
  document.getElementById('totalXP').textContent=S.totalXP.toLocaleString();
  document.getElementById('lvBadge').textContent='LEVEL '+lv.n;
  document.getElementById('lvTitle').textContent=lv.e+' '+lv.t;
  if(nx){
    const pct=((S.totalXP-lv.xp)/(nx.xp-lv.xp))*100;
    document.getElementById('lvBar').style.width=Math.min(pct,100)+'%';
    document.getElementById('barFrom').textContent=lv.xp.toLocaleString()+' XP';
    document.getElementById('barTo').textContent=nx.xp.toLocaleString()+' XP to next';
  } else {
    document.getElementById('lvBar').style.width='100%';
    document.getElementById('barFrom').textContent='30000 XP';
    document.getElementById('barTo').textContent='👑 La Monstrua';
  }
  const dn=document.getElementById('dailyNum'),db=document.getElementById('dBar'),ds=document.getElementById('dStatus');
  const pct=Math.min((S.dailyXP/100)*100,100);
  dn.textContent=S.dailyXP; db.style.width=pct+'%';
  if(S.dailyXP>=150){dn.className='daily-num hit';db.className='d-bar-fill hit';ds.className='daily-status hit';ds.textContent='🔥 BONUS DAY — '+S.dailyXP+' XP! You monster.';}
  else if(S.dailyXP>=100){dn.className='daily-num hit';db.className='d-bar-fill hit';ds.className='daily-status hit';ds.textContent='✅ Daily goal hit! '+(S.dailyXP-100)+' bonus XP';}
  else{dn.className='daily-num';db.className='d-bar-fill';ds.className='daily-status';ds.textContent='Need '+(100-S.dailyXP)+' more XP to close the day ✦';}
  document.getElementById('streakN').textContent=S.streak;
  document.getElementById('daysN').textContent=S.daysHit;
}

// ════════════════════════════════════════════════════════════
const SECS={vocab:'secVocab',verbs:'secVerbs',grammar:'secGrammar',culture:'secCulture'};
const TYPE_COLORS={vocab:'var(--accent)',verb:'var(--accent2)',grammar:'var(--accent3)',culture:'var(--purple)'};

function renderAll(){
  const cats={vocab:{},verbs:{},grammar:{},culture:{}};
  LESSONS.forEach(l=>{
    if(!cats[l.sec][l.cat]) cats[l.sec][l.cat]=[];
    cats[l.sec][l.cat].push(l);
  });
  Object.entries(cats).forEach(([sec,catMap])=>{
    const el=document.getElementById(SECS[sec]);
    if(!el) return;
    let html='';
    Object.entries(catMap).forEach(([cat,lessons])=>{
      html+=`<div class="cat-label">${cat}<span></span></div>`;
      lessons.forEach(l=>{
        const done=S.done[l.id];
        html+=`<div class="concept ${done?'done':''}" data-id="${l.id}" data-t="${l.type}" onclick="openLesson('${l.id}')">
          <div class="concept-icon">${l.icon}</div>
          <div class="concept-body">
            <div class="concept-name">${l.name}</div>
            <div class="concept-preview">${l.preview}</div>
          </div>
          <div class="concept-right">
            <div class="xp-badge">+${l.xp} XP</div>
            <div class="phase-tag">Phase ${l.phase}</div>
            ${done?'<div class="done-check">✅</div>':''}
          </div>
        </div>`;
      });
    });
    el.innerHTML=html;
  });
}

function renderLevels(){
  const lv=getLv(S.totalXP);
  document.getElementById('secLevels').innerHTML=`
    <div class="cat-label">🏆 Level progression<span></span></div>
    ${LEVELS.map(l=>{
      const here=l.n===lv.n, past=S.totalXP>=l.xp&&!here;
      return `<div class="lv-row ${here?'here':''} ${past?'past':''}">
        <div class="lv-emoji">${l.e}</div>
        <div class="lv-name">${l.t}</div>
        <div class="lv-req">${l.xp.toLocaleString()} XP</div>
        ${here?'<div class="here-badge">YOU ARE HERE</div>':''}
      </div>`;
    }).join('')}`;
}

const TABS=[
  {id:'vocab',label:'📖 Vocabulaire',c:'vocab'},
  {id:'verbs',label:'⚡ Verbes',c:'verbs'},

  {id:'levels',label:'🏆 Levels',c:'levels'},
];
document.getElementById('tabRow').innerHTML=TABS.map((t,i)=>
  `<button class="tab ${i===0?'active':''}" data-c="${t.c}" onclick="switchTab('${t.id}',this)">${t.label}</button>`
).join('');

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const secId='sec'+id.charAt(0).toUpperCase()+id.slice(1);
  document.getElementById(secId).classList.add('active');
  if(id==='levels') renderLevels();
}

// LESSON MODAL
// ════════════════════════════════════════════════════════════
let currentLesson=null;
let exerciseState={};

function openLesson(id){
  const l=LESSONS.find(x=>x.id===id);
  if(!l) return;
  currentLesson=l;
  exerciseState={answers:{},correct:0,total:l.exercises?l.exercises.length:0};

  const modal=document.getElementById('modal');
  const typeClass={vocab:'vocab',verb:'verb',grammar:'grammar',culture:'culture'}[l.type]||'vocab';
  modal.className='modal '+typeClass;

  document.getElementById('mIcon').textContent=l.icon;
  document.getElementById('mTitle').textContent=l.name;
  document.getElementById('mSub').textContent=l.preview;
  const pill=document.getElementById('mXpPill');
  const colors={vocab:TYPE_COLORS.vocab,verb:TYPE_COLORS.verb,grammar:TYPE_COLORS.grammar,culture:TYPE_COLORS.culture};
  const col=colors[l.type]||TYPE_COLORS.vocab;
  pill.style.background=col==='var(--accent)'?'rgba(200,255,62,.15)':col==='var(--accent2)'?'rgba(255,92,62,.15)':col==='var(--accent3)'?'rgba(62,200,255,.15)':'rgba(185,124,255,.15)';
  pill.style.color=col;
  pill.style.border=`1px solid ${col}`;
  pill.textContent=`+${l.xp} XP · Phase ${l.phase}`;

  // progress bar
  document.getElementById('mpFill').style.width='0%';
  document.getElementById('mpLabel').textContent='Work through the exercises to unlock Slay ✦';

  // build body
  let html='';

  // words
  if(l.words&&l.words.length){
    html+=`<div class="cat-label" style="margin-top:.5rem">📚 Vocabulary<span></span></div>`;
    html+=`<div class="word-grid">`;
    l.words.forEach(w=>{
      html+=`<div class="word-card"><div class="word-es">${w.es}</div><div class="word-en">${w.en}</div>${w.ex?`<div class="word-example">${w.ex}</div>`:''}</div>`;
    });
    html+=`</div>`;
  }

  // phrases
  if(l.phrases&&l.phrases.length){
    html+=`<div class="cat-label" style="margin-top:.5rem">💬 Key phrases<span></span></div>`;
    const colors2={verb:'red',grammar:'blue',culture:'purple'};
    const pc=colors2[l.type]||'';
    l.phrases.forEach(p=>{
      html+=`<div class="phrase-block ${pc}"><div class="phrase-es">${p.es}</div><div class="phrase-en">${p.en}</div>${p.note?`<div class="phrase-note">💡 ${p.note}</div>`:''}</div>`;
    });
  }

  // conjugation table
  if(l.conjugation){
    const c=l.conjugation;
    html+=`<div class="cat-label" style="margin-top:1rem">📊 ${c.verb}<span></span></div>`;
    html+=`<table class="conj-table ${c.color||''}"><thead><tr><th>Pronoun</th><th>Form</th></tr></thead><tbody>`;
    c.rows.forEach(r=>{ html+=`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`; });
    html+=`</tbody></table>`;
  }

  // exercises
  if(l.exercises&&l.exercises.length){
    html+=`<div class="cat-label" style="margin-top:1rem">🎯 Exercises<span></span></div>`;
    l.exercises.forEach((ex,i)=>{
      html+=`<div class="exercise-block" id="ex_${i}">`;
      html+=`<div class="ex-label">Exercise ${i+1} of ${l.exercises.length}</div>`;
      html+=`<div class="ex-question">${ex.q}</div>`;
      if(ex.type==='mcq'){
        html+=`<div class="ex-options">`;
        ex.opts.forEach((opt,j)=>{
          html+=`<button class="ex-opt" onclick="answerMCQ(${i},${j})">${opt}</button>`;
        });
        html+=`</div>`;
      } else if(ex.type==='fill'){
        html+=`<input class="fill-input" id="fill_${i}" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill(${i})">`;
        html+=`<button class="check-btn" onclick="checkFill(${i})">Check ✓</button>`;
      }
      html+=`<div class="ex-feedback" id="fb_${i}"></div>`;
      html+='</div>';
    });
  }

  document.getElementById('mBody').innerHTML=html;

  // slay button state
  const slayBtn=document.getElementById('slayBtn');
  const slaySub=document.getElementById('slaySub');
  if(S.done[l.id]){
    slayBtn.textContent='✅ Already slayed!';
    slayBtn.style.background='linear-gradient(135deg,#2a4810,#1a3008)';
    slayBtn.style.color='var(--accent)';
    slayBtn.style.boxShadow='none';
    slayBtn.onclick=null;
    slaySub.textContent='You already earned these XP. Legend.';
  } else {
    slayBtn.textContent='✨ SLAAAAAAAY ✨';
    slayBtn.style.background='linear-gradient(135deg,var(--pink),var(--purple),var(--accent3))';
    slayBtn.style.color='#fff';
    slayBtn.style.boxShadow='0 4px 30px rgba(255,110,180,.3)';
    slayBtn.onclick=slay;
    if(exerciseState.total>0){
      slayBtn.style.opacity='0.4';
      slayBtn.style.pointerEvents='none';
      slaySub.textContent=`Complete all ${exerciseState.total} exercises to unlock ✦`;
    }
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modal').scrollTop=0;
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  currentLesson=null;
}

function handleOverlayClick(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

// EXERCISES
// ════════════════════════════════════════════════════════════
function answerMCQ(exIdx,optIdx){
  if(exerciseState.answers[exIdx]!==undefined) return;
  const ex=currentLesson.exercises[exIdx];
  const opts=document.querySelectorAll(`#ex_${exIdx} .ex-opt`);
  const fb=document.getElementById(`fb_${exIdx}`);
  exerciseState.answers[exIdx]=optIdx;
  const correct=optIdx===ex.ans;
  opts.forEach((o,i)=>{
    if(i===ex.ans) o.classList.add('correct');
    else if(i===optIdx&&!correct) o.classList.add('wrong');
  });
  fb.textContent=ex.fb;
  fb.className='ex-feedback '+(correct?'good':'bad');
  if(correct) exerciseState.correct++;
  showVibeToast(correct);
  checkExerciseProgress();
}

function checkFill(exIdx){
  if(exerciseState.answers[exIdx]!==undefined) return;
  const ex=currentLesson.exercises[exIdx];
  const inp=document.getElementById(`fill_${exIdx}`);
  const fb=document.getElementById(`fb_${exIdx}`);
  const val=inp.value.trim().toLowerCase();
  const expected=(ex.ans||'').toLowerCase();
  const correct=val===expected||val.replace(/[¿¡]/g,'')===expected.replace(/[¿¡]/g,'')||expected.includes(val);
  exerciseState.answers[exIdx]=val;
  inp.className='fill-input '+(correct?'correct':'wrong');
  inp.disabled=true;
  if(!correct) inp.value=inp.value+' → '+ex.ans;
  fb.textContent=ex.fb;
  fb.className='ex-feedback '+(correct?'good':'bad');
  if(correct) exerciseState.correct++;
  showVibeToast(correct);
  checkExerciseProgress();
}

function checkExerciseProgress(){
  const done=Object.keys(exerciseState.answers).length;
  const total=exerciseState.total;
  const pct=total>0?(done/total)*100:100;
  document.getElementById('mpFill').style.width=pct+'%';
  if(done>=total&&total>0){
    document.getElementById('mpLabel').textContent=`All exercises done! ${exerciseState.correct}/${total} correct ✦`;
    const slayBtn=document.getElementById('slayBtn');
    const slaySub=document.getElementById('slaySub');
    if(!S.done[currentLesson.id]){
      slayBtn.style.opacity='1';
      slayBtn.style.pointerEvents='auto';
      slaySub.textContent=`You crushed it! +${currentLesson.xp} XP waiting for you ✨`;
    }
  }
}

// SLAY
// ════════════════════════════════════════════════════════════
function slay(){
  if(!currentLesson||S.done[currentLesson.id]) return;
  const l=currentLesson;
  const prevTotal=S.totalXP;
  S.done[l.id]=true;
  S.totalXP+=l.xp;
  S.dailyXP+=l.xp;
  if(S.dailyXP>S.bestDay) S.bestDay=S.dailyXP;
  if(S.dailyXP>=100&&S.dailyXP-l.xp<100) S.daysHit=(S.daysHit||0)+1;
  save();
  spawnSparkles();
  const slayBtn=document.getElementById('slayBtn');
  const slaySub=document.getElementById('slaySub');
  slayBtn.textContent='✅ SLAYED! +'+l.xp+' XP';
  slayBtn.style.background='linear-gradient(135deg,#1a4008,#0c2805)';
  slayBtn.style.color='var(--accent)';
  slayBtn.style.boxShadow='none';
  slayBtn.onclick=null;
  slaySub.textContent="XP added. Concept locked. You're unstoppable. 👑";
  const lvBefore=getLv(prevTotal),lvAfter=getLv(S.totalXP);
  if(lvAfter.n>lvBefore.n){
    setTimeout(()=>showToast('🏆 LEVEL UP! '+lvAfter.e+' '+lvAfter.t,'gold'),600);
  } else if(S.dailyXP>=100&&S.dailyXP-l.xp<100){
    setTimeout(()=>showToast('✅ Daily 100 XP hit!','green'),400);
  } else {
    showToast('+'+l.xp+' XP — SLAYED!','pink');
  }
  updateUI();
  const card=document.querySelector(`.concept[data-id="${l.id}"]`);
  if(card){
    card.classList.add('done');
    const cr=card.querySelector('.concept-right');
    if(cr&&!cr.querySelector('.done-check')){ const d=document.createElement('div'); d.className='done-check'; d.textContent='✅'; cr.appendChild(d); }
  }
}

function spawnSparkles(){
  const emojis=['✨','⭐','💫','🌟','🔥','👑','💥','🎯'];
  const btn=document.getElementById('slayBtn');
  const rect=btn.getBoundingClientRect();
  for(let i=0;i<18;i++){
    setTimeout(()=>{
      const s=document.createElement('div');
      s.className='sparkle';
      s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      const tx=(Math.random()-0.5)*220;
      const ty=-(Math.random()*180+60);
      s.style.setProperty('--tx',tx+'px');
      s.style.setProperty('--ty',ty+'px');
      s.style.left=(rect.left+rect.width/2+Math.random()*60-30)+'px';
      s.style.top=(rect.top+window.scrollY)+'px';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),950);
    },i*45);
  }
}

// SOUND ENGINE — Web Audio API, no external files
// ════════════════════════════════════════════════════════════
let AC = null;
let musicPlaying = false;
let musicNodes = {};

function getAC(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}

// ── master gain ──────────────────────────────────────────
function masterGain(val=0.7){
  const g=getAC().createGain(); g.gain.value=val;
  g.connect(getAC().destination); return g;
}

// ── basic oscillator one-shot ────────────────────────────
function playTone(freq,type,duration,gainVal,startTime,dest){
  const ac=getAC();
  const osc=ac.createOscillator();
  const g=ac.createGain();
  osc.type=type; osc.frequency.value=freq;
  g.gain.setValueAtTime(gainVal,startTime);
  g.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
  osc.connect(g); g.connect(dest||ac.destination);
  osc.start(startTime); osc.stop(startTime+duration+0.01);
}

// ── noise burst (snare/hi-hat) ───────────────────────────
function playNoise(duration,gainVal,startTime,dest,hipass=2000){
  const ac=getAC();
  const bufSize=ac.sampleRate*duration;
  const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=Math.random()*2-1;
  const src=ac.createBufferSource();
  src.buffer=buf;
  const filter=ac.createBiquadFilter();
  filter.type='highpass'; filter.frequency.value=hipass;
  const g=ac.createGain();
  g.gain.setValueAtTime(gainVal,startTime);
  g.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
  src.connect(filter); filter.connect(g); g.connect(dest||ac.destination);
  src.start(startTime); src.stop(startTime+duration+0.01);
}

// ════════════════════════════════════════════════════════════
// SOUND: CORRECT ✅ — bright hype ding
// ════════════════════════════════════════════════════════════
function soundCorrect(){
  const ac=getAC(); const t=ac.currentTime;
  const dest=masterGain(0.5);
  // rising arpeggio: C5 E5 G5 C6
  [[523,0],[659,0.06],[784,0.12],[1047,0.18]].forEach(([f,d])=>{
    playTone(f,'sine',0.18,0.6,t+d,dest);
    playTone(f*2,'sine',0.1,0.15,t+d,dest);
  });
}

// SOUND: WRONG ❌ — reggaeton-style fail buzz
// ════════════════════════════════════════════════════════════
function soundWrong(){
  const ac=getAC(); const t=ac.currentTime;
  const dest=masterGain(0.55);
  // descending sad tones
  [[300,0,'sawtooth',0.4],[220,0.12,'sawtooth',0.35],[180,0.25,'sawtooth',0.25]].forEach(([f,d,type,g])=>{
    playTone(f,type,0.18,g,t+d,dest);
  });
  // buzzy noise hit
  playNoise(0.15,0.3,t,dest,100);
}

// SOUND: LEVEL UP 🏆 — full fanfare
// ════════════════════════════════════════════════════════════
function soundLevelUp(){
  const ac=getAC(); const t=ac.currentTime;
  const dest=masterGain(0.55);
  // triumphant chord progression
  const notes=[
    [523,0],[659,0],[784,0],       // C major chord
    [698,0.25],[880,0.25],[1047,0.25], // F major chord
    [784,0.5],[988,0.5],[1175,0.5],   // G major chord
    [1047,0.75],[1319,0.75],[1568,0.75],[2093,0.75] // C major high
  ];
  notes.forEach(([f,d])=>playTone(f,'sine',0.35,0.4,t+d,dest));

// SOUND: SLAY 👑 — dramatic fanfare + TTS voice
// ════════════════════════════════════════════════════════════
function soundSlay(){
  const ac=getAC(); const t=ac.currentTime;
  const dest=masterGain(0.6);

  // big dramatic fanfare
  const fanfare=[
    [523,0,0.3],[659,0,0.3],[784,0,0.3],[1047,0,0.5],
    [880,0.35,0.3],[1047,0.35,0.3],[1319,0.35,0.4],
    [1047,0.65,0.6],[1319,0.65,0.6],[1568,0.65,0.6],[2093,0.65,0.8],
  ];
  fanfare.forEach(([f,d,dur])=>playTone(f,'sine',dur,0.45,t+d,dest));
  // kick + snare pattern
  [0,0.25,0.5,0.65].forEach(d=>playNoise(0.12,0.35,t+d,dest,80));
  [0.25,0.75].forEach(d=>playNoise(0.1,0.3,t+d,dest,4000));

  // TTS "SLAAAAAY" — dramatic feminine pitch
  setTimeout(()=>{
    if(!window.speechSynthesis) return;
    const u=new SpeechSynthesisUtterance('Slaaaaaaay!');
    u.pitch=1.8; u.rate=0.75; u.volume=1;
    // try to find a female voice
    const voices=speechSynthesis.getVoices();
    const fem=voices.find(v=>v.name.toLowerCase().includes('female')||
      v.name.includes('Samantha')||v.name.includes('Victoria')||
      v.name.includes('Karen')||v.name.includes('Moira')||
      v.name.includes('Fiona')||v.name.includes('Tessa'));
    if(fem) u.voice=fem;
    speechSynthesis.speak(u);
  }, 800);
}

function startMusic(){

  document.getElementById('musicBtn').style.borderColor='var(--accent)';

function stopMusic(){

  Object.values(musicNodes).forEach(n=>{ try{n.stop();}catch(e){} });
  musicNodes={};
}

let dembowStartTime=0;
function scheduleDembow(){
  if(!musicPlaying) return;
  const ac=getAC();
  const bpm=95;
  const beat=60/bpm;
  const bar=beat*4;
  const now=ac.currentTime;
  const start = dembowStartTime < now ? now+0.05 : dembowStartTime;
  dembowStartTime = start + bar*2;

  const mGain=ac.createGain(); mGain.gain.value=0.28; mGain.connect(ac.destination);

  // bass line
  const bassNotes=[
    [0,55,0.3],[beat*0.5,55,0.15],[beat*0.75,49,0.2],
    [beat,52,0.25],[beat*1.5,55,0.15],[beat*1.75,52,0.1],
    [beat*2,55,0.3],[beat*2.5,55,0.15],[beat*2.75,49,0.2],
    [beat*3,52,0.25],[beat*3.5,55,0.15],[beat*3.75,49,0.1],
    [bar+0,58,0.3],[bar+beat*0.5,58,0.15],[bar+beat*0.75,55,0.2],
    [bar+beat,52,0.25],[bar+beat*1.5,55,0.15],
    [bar+beat*2,58,0.3],[bar+beat*2.5,58,0.15],[bar+beat*2.75,55,0.2],
    [bar+beat*3,52,0.3],[bar+beat*3.5,49,0.2],[bar+beat*3.75,52,0.1],
  ];
  bassNotes.forEach(([d,midi,dur])=>{
    const freq=440*Math.pow(2,(midi-69)/12);
    playTone(freq,'sawtooth',dur,0.5,start+d,mGain);
    playTone(freq/2,'sine',dur,0.4,start+d,mGain);
  });

  // kicks
  const kicks=[0,beat*0.75,beat*1.5,beat*2,beat*2.75,beat*3.5,
               bar,bar+beat*0.75,bar+beat*1.5,bar+beat*2,bar+beat*2.75,bar+beat*3.5];
  kicks.forEach(d=>{
    playNoise(0.08,0.6,start+d,mGain,20);
    playTone(60,'sine',0.12,0.7,start+d,mGain);
  });

  // snares
  const snares=[beat,beat*3,bar+beat,bar+beat*3];
  snares.forEach(d=>playNoise(0.07,0.4,start+d,mGain,1800));

  // hi-hats
  for(let i=0;i<16;i++){
    if(i%2===0) continue;
    playNoise(0.04,0.15,start+(i*(beat/4)),mGain,8000);
  }
  for(let i=0;i<16;i++){
    if(i%2===0) continue;
    playNoise(0.04,0.15,start+bar+(i*(beat/4)),mGain,8000);
  }

  const delay=(dembowStartTime-ac.currentTime-0.1)*1000;
  setTimeout(()=>scheduleDembow(), Math.max(delay,50));
}
